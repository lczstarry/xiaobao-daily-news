  se.innerHTML='<div class="sec-h"><span class="sec-bar" style="background:'+c+'"></span>'
    +'<h2>'+esc(s.label)+'</h2><span class="cnt">'+s.items.length+' 条</span></div>';
  if(s.weather){
    var wg=document.createElement('div');wg.className='grid';
    s.items.forEach(function(it){
      gidx++;var emo=WEMO[it.code]||'🌡️';
      var wd=document.createElement('div');wd.className='card wcard';wd.style.cursor='pointer';
      wd.addEventListener('click',function(){openWx(it)});
      var wrd=it.is_new?'<span class="reddot" title="今日要闻"></span>':'';
      wd.innerHTML=wrd
        +'<div class="wcity">'+emo+' '+esc(it.city)+'</div>'
        +'<div class="wtemp">'+esc(it.temp)+'<span class="unit">°C</span></div>'
        +'<div class="wcond">'+esc(it.cond)+' · 最高'+esc(it.high)+'° 最低'+esc(it.low)+'°</div>'
        +'<div class="wmeta">💨 '+esc(it.wind)+'　💧 湿度'+esc(it.hum)+'%</div>'
        +'<p class="wtip">'+esc(it.note)+'</p>'
        +'<div class="wmore">👆 点击查看未来 15 天预报</div>';
      wg.appendChild(wd);
    });
    se.appendChild(wg);app.appendChild(se);return;
  }
  var g=document.createElement('div');g.className='grid';
  s.items.forEach(function(it){
    gidx++;var u=it.url||'#';
    var m='<span class="src" title="'+esc(it.src||'')+'">'+esc(it.src||'')+'</span>';
    if(it.date)m+='<span class="date">'+esc(it.date)+'</span>';
    var cd=document.createElement('div');cd.className='card';
    var rdot=it.is_new?'<span class="reddot" title="今日要闻"></span>':'';
    cd.innerHTML=rdot
      +'<div class="title">'+esc(it.title||'')+'</div><div class="meta">'+m+'</div>'
      +'<p class="body">'+esc(tr(it.sum||'',60))+'</p>'
      +'<a class="lnk" href="'+eA(u)+'" target="_blank" rel="noopener noreferrer">阅读原文 &rarr;</a>';
    g.appendChild(cd)});
  se.appendChild(g);app.appendChild(se)});
var sn=document.createElement('a');sn.href='#sources';sn.textContent='常备关注源';nav.appendChild(sn);
var sp=document.createElement('section');sp.className='sources';sp.id='sources';
sp.innerHTML='<h2>常备关注源 · 教研必备</h2><p class="ld">以下为高校经济学/统计学教师日常应持续跟踪的权威信源，建议加入浏览器收藏夹或 RSS 订阅。</p>';
var sg=document.createElement('div');sg.className='src-g';
(D.sources||[]).forEach(function(s){
  var sc=document.createElement('div');sc.className='src-c';
  sc.innerHTML='<div class="cat">'+esc(s.cat)+'</div>'
    +'<a href="'+eA(s.url)+'" target="_blank" rel="noopener noreferrer">'+esc(s.name)+' &rarr;</a>'
    +'<p class="desc">'+esc(s.desc)+'</p>';sg.appendChild(sc)});
sp.appendChild(sg);app.appendChild(sp);
document.getElementById('ft').textContent='本要闻共 '+total+' 条 · 最后更新 '+D.updated+'（北京时间）· 原文以各来源官网为准';
function openWx(it){
  var fc=it.forecast||[];
  document.getElementById('wxmh').innerHTML='🌤️ '+esc(it.city)+' · 未来 15 天预报（点击空白处或按 Esc 关闭）';
  var grid=document.getElementById('wxmg');
  if(!fc.length){ grid.innerHTML='<p style="color:#6b7280">暂无预报数据</p>'; return; }
  var WD=['日','一','二','三','四','五','六'];
  grid.innerHTML=fc.map(function(f){
    var emo=WEMO[f.code]||'🌡️';
    var p=f.date.split('-'); var d=new Date(f.date+'T00:00:00');
    var wd=WD[d.getDay()]; var mm=parseInt(p[1],10), dd=parseInt(p[2],10);
    return '<div class="wxd">'
      +'<div class="wxw">'+mm+'/'+dd+' 周'+wd+'</div>'
      +'<div class="wxe">'+emo+'</div>'
      +'<div class="wxc">'+esc(f.cond)+'</div>'
      +'<div class="wxt">'+esc(f.high)+'° / '+esc(f.low)+'°</div>'
      +'<div class="wxp">💧 降水 '+esc(f.pop)+'%</div>'
      +'<div class="wxw2">🌬 '+esc(f.wind)+' km/h</div>'
      +'</div>';
  }).join('');
  document.getElementById('wxm').classList.add('show');
}
function closeWx(){ document.getElementById('wxm').classList.remove('show'); }
document.addEventListener('keydown',function(e){ if(e.key==='Escape') closeWx(); });
})();
</script>
</body>
</html>
