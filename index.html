/* 仅收录 2026-07-13 当日数据；日期选择器默认即为该日 */
const NEWS_DB = { "2026-07-20": ORIGINAL };
const MIN_DATE="2026-07-20", MAX_DATE="2026-07-20", DEFAULT_DATE="2026-07-20";

/* 日期与“在一起天数”按浏览器当天动态计算，打开即最新 */
const LOVE_BASE_DAYS=618, LOVE_BASE_DATE="2026-07-13";
function fmtToday(){
  var t=new Date();
  var y=t.getFullYear(), m=("0"+(t.getMonth()+1)).slice(-2), d=("0"+t.getDate()).slice(-2);
  var wk=["日","一","二","三","四","五","六"][t.getDay()];
  return {snap:y+"年"+m+"月"+d+"日", wk:"星期"+wk, iso:y+"-"+m+"-"+d};
}
function calcLoveDays(){
  var base=new Date(LOVE_BASE_DATE+"T00:00:00");
  var now=new Date();
  var diff=Math.floor((now-base)/86400000);
  return LOVE_BASE_DAYS+diff;
}

const cs=["#e11d48","#2563eb","#475569","#c2410c","#0e7490","#b45309","#0f766e","#9d174d","#1d4ed8","#6d28d9","#047857","#dc2626","#0ea5e9","#ca8a04","#be185d","#0891b2","#1e40af","#15803d","#7c3aed","#b91c1c","#0d9488","#7c2d12","#525252","#4338ca","#be123c","#a21caf","#166534","#0284c7"];
function $(id){return document.getElementById(id)}
function esc(t){return String(t==null?'':t).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]})}
function eA(t){return esc(t).replace(/'/g,'&#39;')}
function tr(t,n){var a=Array.from(String(t||''));return a.length<=n?a.join(''):a.slice(0,n-1).join('')+'…'}

/* ===== 渲染某日数据 ===== */
function render(D){
  var td=fmtToday();
  $('hd').textContent=td.snap+'（'+td.wk+'）';
  $('hr').textContent='小宝，今天也要好好照顾自己呀 · 每日综合资讯（北京时间）';
  $('hu').textContent='🕒 最后更新：'+D.updated+'（北京时间，精确到分钟）　🔴 今日发布要闻 '+D.new_count+' 条（卡片左上角红点=发布日期为今日）';
  $('love').innerHTML='❤️ 我们已经在一起 <b>'+calcLoveDays()+'</b> 天啦'
    +'<div class="love-msg">小宝，每一天的陪伴，都是我最想和你一起度过的日子。世界再忙，只要有你在身边就很安心。谢谢你陪我走过这么久，往后的每一天也想和你在一起 ❤️ 爱你哟 💕</div>';
  $('fd').textContent=td.snap;

  var total=0;D.sections.forEach(function(s){total+=s.items.length});
  $('tc').textContent=total;

  var chips=$('sc');chips.innerHTML='';
  D.sections.forEach(function(s,i){
    var c=document.createElement('a');c.className='chip';c.href='#s-'+i;
    c.innerHTML='<span class="dot" style="background:'+cs[i%cs.length]+'"></span>'
      +'<span class="n">'+s.items.length+'</span><span class="l">'+esc(s.label)+'</span>';
    chips.appendChild(c);
  });

  var nav=$('nv'),app=$('app'),gidx=0;
  app.innerHTML='';nav.innerHTML='';
  var care=$('care');
  if(D.care&&D.care.length){
    care.innerHTML='<ul>'+D.care.map(function(t){return '<li>💛 '+esc(t)+'</li>'}).join('')+'</ul>';
  } else { care.innerHTML=''; }

  D.sections.forEach(function(s,i){
    var c=cs[i%cs.length];
    var a=document.createElement('a');a.href='#s-'+i;a.textContent=s.label+' ('+s.items.length+')';nav.appendChild(a);
    var se=document.createElement('section');se.className='sec';se.id='s-'+i;
    se.innerHTML='<div class="sec-h"><span class="sec-bar" style="background:'+c+'"></span>'
      +'<h2>'+esc(s.label)+'</h2><span class="cnt">'+s.items.length+' 条</span></div>';
    if(s.weather){
      var wg=document.createElement('div');wg.className='grid';
      s.items.forEach(function(it){
        gidx++;var emo=({0:"☀️",1:"🌤️",2:"⛅",3:"☁️",45:"🌫️",48:"🌫️",51:"🌧️",53:"🌧️",55:"🌧️",56:"🌧️",57:"🌧️",
      61:"🌧️",63:"🌧️",65:"🌧️",66:"🌧️",67:"🌧️",71:"🌨️",73:"🌨️",75:"🌨️",77:"❄️",80:"🌦️",
      81:"🌦️",82:"⛈️",85:"🌨️",86:"🌨️",95:"⛈️",96:"⛈️",99:"⛈️"})[it.code]||'🌡️';
        var wd=document.createElement('div');wd.className='card wcard';
        wd.innerHTML='<div class="wcity">'+emo+' '+esc(it.city)+'</div>'
          +'<div class="wtemp">'+esc(it.temp)+'<span class="unit">°C</span></div>'
          +'<div class="wcond">'+esc(it.cond)+' · 最高'+esc(it.high)+'° 最低'+esc(it.low)+'°</div>'
          +'<div class="wmeta">💨 '+esc(it.wind)+'　💧 湿度'+esc(it.hum)+'%</div>'
          +'<p class="wtip">'+esc(it.note)+'</p>';
        wg.appendChild(wd);
      });
      se.appendChild(wg);app.appendChild(se);return;
    }
    var g=document.createElement('div');g.className='grid';
    s.items.forEach(function(it){
      gidx++;var u=it.url||'#';
      var m='<span class="src" title="'+esc(it.src||'')+'">'+esc(it.src||'')+'</span>';
      if(it.date)m+='<span class="date">'+esc(it.date)+'</span>';
      var cd=document.createElement('div');cd.className='card'+(it.is_issue?' issue':'');
      var rdot=it.is_new?'<span class="reddot" title="发布日期为今日"></span>':'';
      var ibadge=it.is_issue?'<span class="issue-badge">⚠ 重点问题</span>':'';
      cd.innerHTML=rdot+ibadge
        +'<div class="title">'+esc(it.title||'')+'</div><div class="meta">'+m+'</div>'
        +'<p class="body">'+esc(tr(it.sum||'',60))+'</p>'
        +'<a class="lnk" href="'+eA(u)+'" target="_blank" rel="noopener noreferrer">阅读原文 &rarr;</a>';
      g.appendChild(cd);
    });
    se.appendChild(g);app.appendChild(se);
  });

  var sn=document.createElement('a');sn.href='#sources';sn.textContent='常备关注源';nav.appendChild(sn);
  var sp=document.createElement('section');sp.className='sources';sp.id='sources';
  sp.innerHTML='<h2>常备关注源 · 教研必备</h2><p class="ld">以下为高校经济学/统计学教师日常应持续跟踪的权威信源，建议加入浏览器收藏夹或 RSS 订阅。</p>';
  var sg=document.createElement('div');sg.className='src-g';
  (D.sources||[]).forEach(function(s){
    var sc=document.createElement('div');sc.className='src-c';
    sc.innerHTML='<div class="cat">'+esc(s.cat)+'</div>'
      +'<a href="'+eA(s.url)+'" target="_blank" rel="noopener noreferrer">'+esc(s.name)+' &rarr;</a>'
      +'<p class="desc">'+esc(s.desc)+'</p>';sg.appendChild(sc);
  });
  sp.appendChild(sg);app.appendChild(sp);
  $('ft').textContent='本要闻共 '+total+' 条 · 最后更新 '+D.updated+'（北京时间）· 原文以各来源官网为准';

  observeSections(D.sections.length);
  var first=nav.querySelector('a');if(first)first.classList.add('active');
}

/* 滚动高亮当前分类 */
function observeSections(n){
  if(!('IntersectionObserver' in window))return;
  var secs=[];for(var i=0;i<n;i++)secs.push($('s-'+i));
  var io=new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting){
        document.querySelectorAll('#nv a').forEach(function(x){
          x.classList.toggle('active', x.getAttribute('href')==='#'+e.target.id);
        });
      }
    });
  },{rootMargin:'-112px 0px -70% 0px'});
  secs.forEach(function(s){if(s)io.observe(s)});
}

/* ===== 骨架屏 + 动态加载 ===== */
function renderSkeleton(){
  var app=$('app');var html='';
  for(var s=0;s<3;s++){
    html+='<div class="sec"><div class="sec-h"><span class="sec-bar"></span><h2>加载中…</h2></div><div class="grid skeleton">';
    for(var k=0;k<4;k++){
      html+='<div class="skel-card"><div class="skel-line w90"></div><div class="skel-line w70"></div><div class="skel-line w50"></div><div class="skel-line w70"></div></div>';
    }
    html+='</div></div>';
  }
  app.innerHTML=html;
}

function loadDate(dateStr,animate){
  if(!NEWS_DB[dateStr]){
    $('hd').textContent=dateStr;
    $('hr').textContent='该日期暂无新闻归档';
    $('hu').textContent='';
    $('tc').textContent='0';
    $('sc').innerHTML='';$('nv').innerHTML='';$('care').innerHTML='';
    var app=$('app');
    app.innerHTML='<div class="empty"><div class="ico">🗞️</div><h3>该日期暂无收录新闻</h3>'
      +'<p>仅收录 2026-07-13 当日数据。回到今天查看完整要闻。</p>'
      +'<button id="backToday">回到今天</button></div>';
    $('backToday').addEventListener('click',function(){loadDate(DEFAULT_DATE,true)});
    return;
  }
  if(animate!==false){
    renderSkeleton();
    $('hu').textContent='🔄 正在动态加载新闻…';
    setTimeout(function(){render(NEWS_DB[dateStr])},260);
  } else {
    render(NEWS_DB[dateStr]);
  }
}

/* ===== 日期切换交互 ===== */
function shiftDay(delta){
  var dp=$('datePicker');
  var p=dp.value.split('-');var d=new Date(+p[0],+p[1]-1,+p[2]);
  d.setDate(d.getDate()+delta);
  var s=d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);
  if(s<MIN_DATE)s=MIN_DATE;if(s>MAX_DATE)s=MAX_DATE;
  dp.value=s;loadDate(s,true);
}

function init(){
  var dp=$('datePicker');
  dp.min=MIN_DATE;dp.max=MAX_DATE;dp.value=DEFAULT_DATE;
  dp.addEventListener('change',function(){if(dp.value)loadDate(dp.value,true)});
  $('prevDay').addEventListener('click',function(){shiftDay(-1)});
  $('nextDay').addEventListener('click',function(){shiftDay(1)});
  $('todayBtn').addEventListener('click',function(){dp.value=DEFAULT_DATE;loadDate(DEFAULT_DATE,true)});
  loadDate(DEFAULT_DATE,true);
}
document.addEventListener('DOMContentLoaded',init);
