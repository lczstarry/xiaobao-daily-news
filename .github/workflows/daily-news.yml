# 小宝专属每日要闻 —— 自动刷新工作流（方案 A：以 GitHub 仓库为唯一生成源）
# 触发：测试期每 5 分钟一次（验证 kick 禁用→启用后 on:schedule 是否生效）+ 手动触发
# 行为：运行 build_news.py 实时抓取并刷新 index.html，提交回 main 分支 → GitHub Pages 自动部署
# ⚠️ 临时测试用：验证通过后请改回每日 6 档（cron: "0 22,1,4,7,10,13 * * *"，对应北京时间 6/9/12/15/18/21 点）
name: 每日要闻自动刷新

on:
  schedule:
    # 测试期：每 5 分钟触发一次，确认 kick 后定时机制可用
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # 允许在 Actions 页面手动触发，便于验证

permissions:
  contents: write        # 需要写权限以提交刷新后的 index.html

concurrency:
  group: daily-news
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 运行数据刷新脚本
        run: python3 build_news.py

      - name: 提交并推送刷新结果
        run: |
          git config user.name "xiaobao-bot"
          git config user.email "bot@xiaobao.local"
          if git diff --quiet -- index.html; then
            echo "内容无变化，跳过提交"
            exit 0
          fi
          git add index.html
          git commit -m "自动刷新每日要闻 $(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M')"
          git push
