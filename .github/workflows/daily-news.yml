name: 每日要闻自动刷新

on:
  schedule:
    # 每小时第 16 分钟触发一次（北京时间）
    - cron: "16 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-news
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 运行数据刷新脚本
        run: python3 build_news.py

      - name: 提交并推送刷新结果
        run: |
          git config user.name "xiaobao-bot"
          git config user.email "bot@xiaobao.local"
          if git diff --quiet -- index.html; then
            echo "内容无变化，跳过提交"
            exit 0
          fi
          git add index.html
          git commit -m "自动刷新每日要闻 $(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M')"
          git push
