# 小宝专属每日要闻 —— 自动刷新工作流（方案 A：以 GitHub 仓库为唯一生成源）
# 触发：每小时第 16 分钟（北京时间）+ 手动触发（Actions 页面/CLI Run workflow）
# 行为：运行 build_news.py 实时抓取并刷新 index.html，提交回 main 分支 → GitHub Pages 自动部署
# 注：GitHub 原生 on:schedule 当前对该仓库不触发(平台侧调度问题，已多次验证)，自动刷新暂以手动/CLI/外部调度器触发兜底。
name: 每日要闻自动刷新

on:
  schedule:
    # 每小时第 16 分钟触发一次（北京时间），刷新网页
    - cron: "16 * * * *"
  workflow_dispatch: {}   # 允许在 Actions 页面/CLI 手动触发，便于验证与兜底

permissions:
  contents: write        # 需要写权限以提交刷新后的 index.html

concurrency:
  group: daily-news
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 运行数据刷新脚本
        run: python3 build_news.py

      - name: 提交并推送刷新结果
        run: |
          git config user.name "xiaobao-bot"
          git config user.email "bot@xiaobao.local"
          if git diff --quiet -- index.html; then
            echo "内容无变化，跳过提交"
            exit 0
          fi
          git add index.html
          git commit -m "自动刷新每日要闻 $(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M')"
          git push
